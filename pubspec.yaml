name: swimtrack
description: SwimTrack — Smart Swimming Training Companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  go_router: ^13.2.0
  dio: ^5.4.0
  wifi_iot: ^0.3.19+1
  sqflite: ^2.3.0
  path: ^1.9.0
  shared_preferences: ^2.2.3
  fl_chart: ^0.66.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  wakelock_plus: ^1.1.4
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

# ── App Icon Configuration ─────────────────────────────────────────────────
# Run: dart run flutter_launcher_icons
# Place your 1024x1024 PNG at: assets/icon/app_icon.png
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true          # required for App Store compliance
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "assets/icon/app_icon.png"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: false